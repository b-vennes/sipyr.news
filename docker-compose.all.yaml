services:
  database:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: pass
    volumes:
      - ./database/1_initialize.sql:/docker-entrypoint-initdb.d/1_initialize.sql:ro
      - ./database/2_test-data.sql:/docker-entrypoint-initdb.d/2_test-data.sql:ro
      - ./database/3_example-games-news-feed.sql:/docker-entrypoint-initdb.d/3_example-games-news-feed.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  queries:
    image: bvennes/queries.sipyr.news
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_DATABASE: postgres
      POSTGRES_PASSWORD: pass
      QUERIES_HOST: 0.0.0.0
      QUERIES_PORT: 9000
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "9000:9000"

  sourcing:
    image: bvennes/sourcing.sipyr.news
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_DATABASE: postgres
      POSTGRES_PASSWORD: pass
      SOURCING_POLL_INTERVAL_SECONDS: 300
    depends_on:
      database:
        condition: service_healthy

  web:
    image: bvennes/app.sipyr.news
    environment:
      QUERIES_API: http://queries:9000
    depends_on:
      queries:
        condition: service_started
    ports:
      - "8000:8000"

volumes:
  postgres_data:
